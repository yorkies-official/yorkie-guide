<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #2C1A0E;
    font-family: 'Lato', sans-serif;
    color: #FDF6EC;

    justify-content: center;

    padding: 40px 20px;
  }
  .container { max-width: 480px; margin: 0 auto; }
  .checkmark { font-size: 64px; margin-bottom: 20px; }
  h1 {

  }

  .btn {
    display: inline-block;
